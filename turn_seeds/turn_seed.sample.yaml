turn:
  title: "Ход 2: Тема от главного мастера"
  deadline: "2026-05-18 22:00"

# Если theme пустой или отсутствует, Codex генерирует ход сам,
# опираясь на энциклопедию Танелорна и базу персонажей.
theme:
  tone: "городская мистика"
  focus:
    - "Стекольный квартал"
    - "пропажи ремесленников"
    - "след старого культа"
  must_include:
    - "хотя бы одна миссия с расследованием"
    - "хотя бы одна миссия с социальным конфликтом"
  avoid:
    - "не выводить события за пределы Танелорна"

# Необязательно: пожелание к общей иллюстрации хода.
# Codex все равно добавит turn.art.prompt в готовый turn.yaml.
art:
  mood: "туманное утро, тревога, стекло и отражения"
  style: "кинематографичная городская фэнтези-иллюстрация без текста"

# Можно указать только идеи миссий. Codex дополнит описание, сложность,
# угрозы и недостающие миссии до нужного количества.
mission_seeds:
  - title: "Ночные зеркала"
    idea: "В стекольных мастерских зеркала начали показывать завтрашние преступления."

  - title: "Долг мастера Вейна"
    idea: "Старый стекольщик должен деньги двум фракциям сразу."
    preferred_difficulty: 7

# Можно указать почти готовую миссию. Codex должен сохранить заданные поля
# и дополнить только отсутствующее.
fixed_missions:
  - title: "Плач в плавильне"
    description: "В заброшенной плавильне слышат детский плач, хотя вход туда замурован с прошлой зимы."
    difficulty: 8
    reward:
      type: "spells"
      level: 3
      idea: "заклинание, связанное со стеклом, жаром или эхом"
    threat:
      type: "haunting"
      notes: "Дух не злой, но опасный из-за искаженной памяти."
