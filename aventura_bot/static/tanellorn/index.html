<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Танелорн</title>
    <link rel="stylesheet" href="/static/tanellorn/tanellorn.css?v=20260528-lore">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/tanellorn/tanellorn_lore.js?v=20260528-lore"></script>
    <script src="/static/tanellorn/tanellorn.js?v=20260528-lore" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Танелорн</h1>
          <p id="turnTitle" class="turn-title">Открытые миссии</p>
        </div>
        <button id="heroButton" class="hero-button" type="button" hidden></button>
      </header>
      <section class="map-viewport" id="mapViewport" aria-label="Карта Танелорна">
        <div class="city-map" id="cityMap">
          <p id="mapStatus" class="map-status">Загрузка карты...</p>
          <div id="mapHotspots" class="map-hotspots"></div>
          <div id="missionMarkers" class="markers"></div>
        </div>
      </section>
      <div id="modalBackdrop" class="modal-backdrop" hidden>
        <section id="missionPanel" class="mission-panel" role="dialog" aria-modal="true" aria-labelledby="missionTitle" aria-live="polite">
          <div class="panel-head">
            <div>
              <p id="missionType" class="mission-type">Миссия</p>
              <h2 id="missionTitle"></h2>
            </div>
            <button id="closePanel" class="icon-button" type="button" aria-label="Закрыть">&times;</button>
          </div>
          <div class="mission-meta">
            <span id="missionDifficulty"></span>
            <span id="missionParticipants"></span>
          </div>
          <p id="missionDescription" class="mission-description"></p>
          <p id="missionFeedback" class="feedback" hidden></p>
          <button id="joinMissionButton" class="command-button" type="button"></button>
          <form id="actionForm" class="action-form" hidden>
            <label class="field-label" for="actionText">Твой ход</label>
            <textarea id="actionText" minlength="120" maxlength="3000" rows="5"></textarea>
            <div class="action-footer">
              <span id="actionCount" class="character-count">0 / 3000</span>
              <button class="command-button" type="submit">Отправить ход</button>
            </div>
          </form>
        </section>
      </div>
      <div id="infoBackdrop" class="modal-backdrop" hidden>
        <section class="info-panel" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
          <div class="panel-head">
            <div class="info-heading">
              <img id="infoIcon" class="info-icon" alt="" hidden>
              <h2 id="infoTitle"></h2>
            </div>
            <button id="closeInfo" class="icon-button" type="button" aria-label="Закрыть">&times;</button>
          </div>
          <div id="infoContent" class="info-content"></div>
        </section>
      </div>
    </main>
  </body>
</html>
